name: fallsense_app
description: "FallSense MVP - Fall detection app for visually impaired users using Flutter"

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Sensors
  sensors_plus: ^6.1.0

  # Background Service
  flutter_background_service: ^5.0.0
  flutter_background_service_android: ^6.3.1
  flutter_background_service_ios: ^5.0.3

  # Screen Control & Notifications
  wakelock_plus: ^1.2.0
  flutter_local_notifications: ^17.0.0

  # Machine Learning
  tflite_flutter: ^0.10.1

  # Location Services
  geolocator: ^9.0.0

  # SMS via native app
  url_launcher: ^6.2.0

  # Accessibility & TTS
  flutter_tts: ^4.2.5

  # Speech Recognition
  speech_to_text: ^7.0.0

  # Alert (flashlight + vibration)
  torch_light: ^1.1.0
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Optional: Add assets (like the .tflite model)
  # assets:
  #   - assets/models/fall_detection_model.tflite
